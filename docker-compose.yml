services:
  postgres:
    image: postgres:16-alpine
    container_name: studio99-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: studio99_app_core
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:v1.26
    container_name: studio99-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  minio:
    image: minio/minio:RELEASE.2026-03-27T22-07-57Z
    container_name: studio99-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: studio99secret
      MINIO_ROOT_USER: studio99
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data

  stripe-cli:
    image: stripe/stripe-cli:v1.29.0
    container_name: studio99-stripe-cli
    profiles:
      - stripe
    restart: unless-stopped
    command:
      - listen
      - --api-key
      - ${STRIPE_SECRET_KEY}
      - --forward-to
      - ${STRIPE_WEBHOOK_FORWARD_TO:-http://host.docker.internal:3000/api/stripe/webhook}
    extra_hosts:
      - host.docker.internal:host-gateway

volumes:
  postgres-data:
  minio-data:
