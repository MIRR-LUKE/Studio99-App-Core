name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: studio99_app_core
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d studio99_app_core"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/studio99_app_core
      PAYLOAD_SECRET: replace-with-a-long-random-secret
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
      STRIPE_SECRET_KEY: sk_test_placeholder
      STRIPE_WEBHOOK_SECRET: whsec_placeholder
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-fund --no-audit
          fi

      - name: Generate Payload types
        run: npm run generate:types

      - name: Generate Payload import map
        run: npm run generate:importmap

      - name: Run lint
        run: |
          if [ -f eslint.config.mjs ] || [ -f .eslintrc.json ] || [ -f .eslintrc.cjs ] || [ -f .eslintrc.js ]; then
            npm run lint
          else
            echo "Skipping lint because no ESLint config is present yet."
          fi

      - name: Run typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
